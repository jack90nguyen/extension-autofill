<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneFill Options</title>
    <style>
      :root {
        --bg: #f5f7fa;
        --panel: #ffffff;
        --text: #17212f;
        --muted: #5f6b7a;
        --accent: #0d6e6e;
        --accent-hover: #0a5a5a;
        --border: #dce3ea;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, #ffffff 0%, var(--bg) 65%);
      }

      .page {
        max-width: 780px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.45;
      }

      .row {
        margin-bottom: 10px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #2f3f54;
      }

      textarea,
      input[type="number"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        font-size: 13px;
        padding: 8px 10px;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        font-size: 13px;
        padding: 8px 10px;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      }

      textarea {
        resize: vertical;
        line-height: 1.4;
        min-height: calc(10 * 1.4em + 16px);
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 8px;
      }

      button {
        width: auto;
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
        color: #ffffff;
        background: linear-gradient(180deg, var(--accent), #0a6464);
        cursor: pointer;
      }

      button:hover {
        background: linear-gradient(180deg, var(--accent-hover), #084b4b);
      }

      .ghost {
        color: var(--text);
        background: #ffffff;
        border-color: var(--border);
      }

      .ghost:hover {
        background: #f0f4f8;
      }

      .status {
        margin-top: 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px 12px;
        min-height: 20px;
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>OneFill Options</h1>
        <p>
          Configure dataset values used during autofill. Open this page from extension menu:
          right click icon -> Options.
        </p>

        <div class="row">
          <label for="namesInput">Names (one per line)</label>
          <textarea id="namesInput" rows="10"></textarea>
        </div>

        <div class="row">
          <label for="emailsInput">Emails (one per line)</label>
          <textarea id="emailsInput" rows="10"></textarea>
        </div>

        <div class="row">
          <label for="phonesInput">Phones (one per line)</label>
          <textarea id="phonesInput" rows="10"></textarea>
        </div>

        <div class="row">
          <label for="addressesInput">Addresses (one per line)</label>
          <textarea id="addressesInput" rows="10"></textarea>
        </div>

        <div class="row">
          <label for="companiesInput">Companies (one per line)</label>
          <textarea id="companiesInput" rows="10"></textarea>
        </div>

        <div class="row">
          <label for="urlsInput">URLs (one per line)</label>
          <textarea id="urlsInput" rows="10"></textarea>
        </div>

        <div class="row">
          <label for="passwordInput">Default password</label>
          <input id="passwordInput" type="text" autocomplete="off" />
        </div>

        <div class="row">
          <label for="paragraphInput">Paragraph source</label>
          <textarea id="paragraphInput" rows="10"></textarea>
        </div>

        <div class="row">
          <label for="minWordsInput">Min words</label>
          <input id="minWordsInput" type="number" min="3" max="200" />
        </div>

        <div class="row">
          <label for="maxWordsInput">Max words</label>
          <input id="maxWordsInput" type="number" min="3" max="200" />
        </div>

        <div class="actions">
          <button id="saveDataset" type="button">Save Dataset</button>
          <button id="restoreDefaults" type="button" class="ghost">Restore Defaults</button>
        </div>

        <div class="status" id="status" role="status" aria-live="polite">Ready</div>
      </section>
    </main>
    <script src="../data/dataset-manager.js"></script>
    <script src="options.js"></script>
  </body>
</html>
